{% load static %}
{% load crispy_forms_tags %}

<!DOCTYPE html>
<html lang="en" class="h-100">


<head>
    <meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="keywords" content="" />
	<meta name="author" content="" />
	<meta name="robots" content="" />
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<meta name="description" content="KwikSchools : KwikSchools-School Mgt System" />
	<meta property="og:title" content="KwikSchools : KwikSchools-School Mgt System" />
	<meta property="og:description" content="KwikSchools : KwikSchools-School Mgt System" />
	<meta name="format-detection" content="telephone=no">

	<title>Password Reset</title>

	<link rel="shortcut icon" type="image/png" href="{% static 'pages/images/favicon.png'%} " />
    <link href="{% static 'pages/css/style.css' %}" rel="stylesheet">

    <style>
        .auth-footer {
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(0, 0, 0, 0.1);
            font-size: 0.8rem;
            text-align: center;
            color: #6e6e6e;
        }
    </style>
</head>

{% block content %}
<body class="vh-100">
    <div class="authincation h-100">
        <div class="container h-100">
            <div class="row justify-content-center h-100 align-items-center">
                <div class="col-md-6">
                    <div class="authincation-content">
                        <div class="row no-gutters">
                            <div class="col-xl-12">
                                <div class="auth-form">
									<div class="text-center mb-3">
                                        <a href="https://kwikschools.com"><img src="{{ school_info.logo.url }}" alt="kwikSchools" style="width: auto; height: 80px;"></a>
									</div>

                                    <h4 class="text-center mb-4">Forgot Password ?</h4>
                                    <p class="text-center">Enter your email address below</p>
                                    <form action="" method="POST">
                                        {% csrf_token %}

                                        {{ form|crispy}}
                                        <div class="text-center mt-4">
                                            <button type="submit" value="submit" class="btn btn-primary btn-block">Reset Password</button>
                                        </div>
                                    </form>

                                    <div class="new-account mt-3">
                                        <p class="text-center">Back To: <a class="text-primary" href="{% url 'pages:portal-home' %}"> DASHBOARD </a>
                                        </p>
                                    </div>

                                    <footer class="auth-footer">
                                        <p class="mb-0">POWERED BY: <a href="https://kwikschools.com"> KwikSchools EdTech</a></p>
                                    </footer>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    {% endblock content %}

    {% block script %}
    <script src="{% static 'pages/vendor/global/global.min.js' %}"></script>
    <script src="{% static 'pages/js/custom.min.js' %}"></script>
    <script src="{% static 'pages/js/dlabnav-init.js' %}"></script>
	<script src="{% static 'pages/js/styleSwitcher.js' %}"></script>
    {% endblock script %}
</body>
</html>
