{% load static %}
<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Deleted</title>
    <link rel="shortcut icon" type="image/png" href="{% static 'pages/images/favicon.png' %}" />

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #0d1a26; /* Dark slate blue background */
            color: #f8f9fa; /* Light text color */
        }
        .card {
            background-color: #1a293a; /* Dark blue card background */
            border: none;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
        .text-orange {
            color: #ff5e00; /* Vibrant orange for highlights */
        }
        .btn-secondary-dark {
            background-color: #2c3e50; /* Darker secondary button */
            border-color: #2c3e50;
            color: #fff;
        }
        .btn-secondary-dark:hover {
            background-color: #233140; /* Slightly darker on hover */
            border-color: #233140;
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card p-4 text-center">
                    <div class="card-body">
                        <h2 class="card-title text-orange mb-4">Success!</h2>
                        <p class="fs-5">The event has been successfully deleted.</p>
                        <a href="{% url 'events:calendar' %}" class="btn btn-secondary-dark mt-4">Back to Calendar</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
