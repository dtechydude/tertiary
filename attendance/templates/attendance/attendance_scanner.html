{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

    <style>
        :root {
            --primary-bg: #f1f5f9;
            --card-bg: #ffffff;
            --dark: #0f172a;
        }

        body {
            background-color: var(--primary-bg);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            margin: 0;
        }

        /* ===== HEADER ===== */
        .app-header {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            padding: 14px 16px 18px;
            text-align: center;
            border-bottom-left-radius: 22px;
            border-bottom-right-radius: 22px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .app-header h6 {
            font-weight: 800;
            letter-spacing: 0.4px;
            margin-bottom: 2px;
        }

        .app-header small {
            opacity: 0.75;
            font-size: 0.75rem;
        }

        /* ===== RESULT MESSAGE ===== */
        #result-message {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 24px);
            max-width: 420px;
            z-index: 9999;
            border-radius: 14px;
            padding: 14px;
            font-weight: 800;
            text-align: center;
            box-shadow: 0 8px 25px rgba(0,0,0,0.25);
            animation: slideDown 0.25s ease-out;
        }

        @keyframes slideDown {
            from { transform: translate(-50%, -20px); opacity: 0; }
            to { transform: translate(-50%, 0); opacity: 1; }
        }

        /* ===== MAIN CONTENT ===== */
        .main-content {
            padding: 12px;
            max-width: 520px;
            margin: 0 auto;
        }

        /* ===== STATS CARD ===== */
        .stat-overlay-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 14px 10px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-shadow: 0 6px 18px rgba(0,0,0,0.06);
            margin-bottom: 12px;
        }

        .stat-value {
            font-size: 1.6rem;
            font-weight: 900;
            line-height: 1;
        }

        .stat-label {
            font-size: 0.65rem;
            color: #64748b;
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: 0.5px;
        }

        /* ===== SCANNER ===== */
        .scanner-wrapper {
            background: #000;
            border-radius: 22px;
            overflow: hidden;
            position: relative;
            border: 4px solid #fff;
            box-shadow: 0 14px 35px rgba(0,0,0,0.15);
            height: min(70vh, 520px);
        }

        #reader {
            width: 100% !important;
            height: 100% !important;
            border: none !important;
        }

        /* ===== SCAN LOG ===== */
        #scan-log {
            background: #e2e8f0;
            display: inline-block;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            margin-top: 12px;
            color: #0f172a;
        }

        /* ===== MOBILE TWEAKS ===== */
        @media (max-width: 480px) {
            .scanner-wrapper {
                height: 68vh;
            }

            .stat-value {
                font-size: 1.45rem;
            }
        }
    </style>
</head>

<body>

<div id="result-message" class="alert d-none"></div>

<div class="app-header">
    <h6 class="mb-0">Attendance Scanner</h6>
    <small>{% now "D, d M" %}</small>
</div>

<div class="main-content">

    <div class="stat-overlay-card">
        <div class="text-center">
            <span id="count-present" class="stat-value text-success">
                {{ present_count }}
            </span>
            <div class="stat-label">Present</div>
        </div>

        <div style="width:1px;height:32px;background:#e5e7eb;"></div>

        <div class="text-center">
            <span class="stat-value text-dark">
                {{ total_students }}
            </span>
            <div class="stat-label">Total</div>
        </div>
    </div>

    <div class="scanner-wrapper">
        <div id="reader"></div>
    </div>

    <div class="text-center">
        <div id="scan-log">Detecting Camera...</div>
    </div>

</div>

<script>
    let isProcessing = false;
    const html5QrCode = new Html5Qrcode("reader");
    const rawUrl = "{% url 'attendance:scan_attendance_ajax' '00000' %}";

    function onScanSuccess(decodedText) {
        if (isProcessing) return;
        isProcessing = true;

        document.getElementById('scan-log').innerText = "Processing...";
        if (navigator.vibrate) navigator.vibrate(80);

        let usn = decodedText.trim().split('-')[0].trim(); 
        const finalUrl = rawUrl.replace('00000', usn);

        fetch(finalUrl)
        .then(res => res.json())
        .then(data => {
            const msg = document.getElementById('result-message');
            msg.className = `alert d-block alert-${data.status === 'success' ? 'success' : 'danger'}`;
            msg.innerText = data.message;
            msg.classList.remove('d-none');

            if (data.status === 'success') {
                document.getElementById('count-present').innerText = data.present_count;
            }

            setTimeout(() => {
                msg.classList.add('d-none');
                isProcessing = false;
                document.getElementById('scan-log').innerText = "Ready for next scan";
            }, 2500);
        })
        .catch(() => {
            isProcessing = false;
            document.getElementById('scan-log').innerText = "Network Error";
        });
    }

    const config = {
        fps: 10,
        qrbox: { width: 220, height: 220 },
        aspectRatio: 1.0
    };

    function startScanner() {
        html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess)
        .then(() => {
            document.getElementById('scan-log').innerText = "Back Camera Active";
        })
        .catch(() => {
            html5QrCode.start({ facingMode: "user" }, config, onScanSuccess)
            .then(() => {
                document.getElementById('scan-log').innerText = "Standard Camera Active";
            })
            .catch(() => {
                document.getElementById('scan-log').innerText = "Camera Error";
            });
        });
    }

    startScanner();
</script>

</body>
</html>
